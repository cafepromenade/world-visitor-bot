services:
  bluemap:
    image: ghcr.io/bluemap-minecraft/bluemap:latest
    restart: "no"
    command: -r
    volumes:
      - './config:/app/config'
      - './config/webserver-off.conf:/app/config/webserver.conf'
      - '${WORLD_PATH:-./world}:/app/world'
      - './data:/app/data'
      - './web:/app/web'
      - './world_nether:/app/world_nether'
      - './world_the_end:/app/world_the_end'
