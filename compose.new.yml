services:
  mc:
    image: itzg/minecraft-server:latest
    restart: "no"
    tty: true
    stdin_open: true
    environment:
      TZ: "America/Toronto"
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "26.1.2"
      ONLINE_MODE: "FALSE"
      VIEW_DISTANCE: "${RENDER_DISTANCE:-28}"
      OPS: "${MC_USERNAME:-Bot},${FOLLOW_PLAYER:-}"
      MOTD: "Overworld Chunk Visitor - New Only"
      DIFFICULTY: "peaceful"
      MODE: "creative"
      SPAWN_PROTECTION: "0"
      ENABLE_COMMAND_BLOCK: "true"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "visitor"
      MEMORY: "${MC_MEMORY:-4G}"
      USE_AIKAR_FLAGS: "true"
      JVM_OPTS: "-DPaper.useAtomicWorldMove=false"
      MAX_TICK_TIME: "-1"
      LEVEL: "world"
      MODRINTH_PROJECTS: "viaversion,viabackwards,paper:bluemap?"
    ports:
      - "${MC_PORT:-25566}:25565"
      - "8100:8100"
    volumes:
      - '${HOST_PROJECT_DIR:-.}/mc-data-new:/data'
      - '${HOST_PROJECT_DIR:-.}/config/spigot.yml:/data/spigot.yml'
      - '${HOST_PROJECT_DIR:-.}/config:/data/plugins/BlueMap'
      - '${HOST_PROJECT_DIR:-.}/web:/data/plugins/BlueMap/web'
      - '${HOST_PROJECT_DIR:-.}/data:/data/plugins/BlueMap/data'
      - '${HOST_PROJECT_DIR:-.}/web:/data/web'
      - '${HOST_PROJECT_DIR:-.}/data:/data/data'
      - '${WORLD_PATH:-./mc-data-new/world}:/app/world:ro'

  visitor-new:
    image: world-visitor-bot-visitor:latest
    build: ${HOST_PROJECT_DIR:-.}/bot
    restart: "no"
    mem_limit: "${BOT_MEMORY:-2G}"
    depends_on:
      mc:
        condition: service_healthy
    environment:
      - WORLD_DIR=/repo/world
      - STATE_DIR=/app/state
      - MC_HOST=mc
      - MC_PORT=25565
      - TZ=America/Toronto
      - MC_USERNAME=${MC_USERNAME:-Bot}
      - MC_AUTH=offline
      - NEW_ONLY=true
      - RENDER_DISTANCE=${RENDER_DISTANCE:-28}
      - FLY_Y=${FLY_Y:-200}
      - GRID_STEP=${GRID_STEP:-80}
      - WP_DELAY=${WP_DELAY:-2000}
      - REGION_DELAY=${REGION_DELAY:-3000}
      - CHUNK_LOAD_TIMEOUT=${CHUNK_LOAD_TIMEOUT:-30000}
      - CHUNK_CHECK_RADIUS=${CHUNK_CHECK_RADIUS:-1}
      - MOVE_MODE=${MOVE_MODE:-smooth}
      - MOVE_STEP=${MOVE_STEP:-32}
      - MOVE_DELAY=${MOVE_DELAY:-150}
      - FOLLOW_PLAYER=${FOLLOW_PLAYER:-}
      - BLUEMAP_MARKERS_JSON=/app/bluemap-web/maps/overworld/live/markers.json
      - BLUEMAP_BACKUP_MARKERS_JSON=/app/bluemap-web/maps/overworld/live/bot-markers.backup.json
      - BOT_COUNT=${BOT_COUNT:-1}
      - BOT_INDEX=0
      - SHUTDOWN_ON_COMPLETE=true
    volumes:
      - '${WORLD_PATH:-./mc-data-new/world}:/repo/world:ro'
      - '${HOST_PROJECT_DIR:-.}/.git:/repo/.git:ro'
      - '${HOST_PROJECT_DIR:-.}/state:/app/state'
      - '${HOST_PROJECT_DIR:-.}/config:/app/bluemap-config'
      - '${HOST_PROJECT_DIR:-.}/web:/app/bluemap-web'
