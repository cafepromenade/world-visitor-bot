services:
  control:
    build: ./control
    restart: unless-stopped
    ports:
      - '80:80'
      - '3000:3000'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    environment:
      - PROJECT_DIR=/workspace
      - HOST_PROJECT_DIR=${HOST_PROJECT_DIR:-.}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-world-visitor-bot}
      - DOMAIN=${DOMAIN:-bigheados.com}
      - HOST_IP=${HOST_IP:-}
      - TZ=America/Toronto
      - BUG_WATCHER_ENABLED=${BUG_WATCHER_ENABLED:-1}
      - BUG_WATCHER_TREAT_WARNINGS_AS_ERRORS=${BUG_WATCHER_TREAT_WARNINGS_AS_ERRORS:-1}
      - BUG_WATCHER_INTERVAL_MS=${BUG_WATCHER_INTERVAL_MS:-60000}
      - OPENCODE_AUTOFIX=${OPENCODE_AUTOFIX:-1}
      - OPENCODE_SKIP_PERMISSIONS=${OPENCODE_SKIP_PERMISSIONS:-1}
      - OPENCODE_ALLOW_SUDO=${OPENCODE_ALLOW_SUDO:-1}
      - OPENCODE_AUTO_PUSH=${OPENCODE_AUTO_PUSH:-1}
      - OPENCODE_AUTO_PR=${OPENCODE_AUTO_PR:-1}
      - BUG_WATCHER_AUTO_MERGE=${BUG_WATCHER_AUTO_MERGE:-1}
      - BUG_WATCHER_AUTO_MERGE_MS=${BUG_WATCHER_AUTO_MERGE_MS:-300000}
      - BUG_WATCHER_MERGE_BRANCH=${BUG_WATCHER_MERGE_BRANCH:-main}
      - WORLD_UPLOAD_LIMIT=${WORLD_UPLOAD_LIMIT:-80gb}
      - PORT=80
      - PORT2=3000
