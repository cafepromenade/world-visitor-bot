services:
  control:
    build: ./control
    restart: unless-stopped
    ports:
      - '80:80'
      - '3000:3000'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app/project
    environment:
      - DOMAIN=${DOMAIN:-bigheados.com}
      - HOST_IP=${HOST_IP:-}
      - PORT=80
      - PORT2=3000
