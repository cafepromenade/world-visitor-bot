services:
  mc:
    image: itzg/minecraft-server:latest
    restart: "no"
    tty: true
    stdin_open: true
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "26.1.2"
      ONLINE_MODE: "FALSE"
      VIEW_DISTANCE: "28"
      OPS: "${MC_USERNAME:-Bot},${MC_USERNAME:-Bot}0,${MC_USERNAME:-Bot}1,${MC_USERNAME:-Bot}2,${MC_USERNAME:-Bot}3,${FOLLOW_PLAYER:-}"
      MOTD: "Overworld Chunk Visitor"
      DIFFICULTY: "peaceful"
      MODE: "creative"
      SPAWN_PROTECTION: "0"
      ENABLE_COMMAND_BLOCK: "true"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "visitor"
      MEMORY: "4G"
      USE_AIKAR_FLAGS: "true"
      MAX_TICK_TIME: "-1"
      LEVEL: "world"
      MODRINTH_PROJECTS: "viaversion,viabackwards"
    ports:
      - "${MC_PORT:-25565}:25565"
    volumes:
      - '${WORLD_PATH:-./world}:/data/world'
      - './mc-data:/data'

  visitor:
    build: ./bot
    restart: "no"
    depends_on:
      mc:
        condition: service_healthy
    environment:
      - WORLD_DIR=/repo/world
      - STATE_DIR=/app/state
      - MC_HOST=mc
      - MC_PORT=25565
      - MC_USERNAME=${MC_USERNAME:-Bot}
      - MC_AUTH=offline
      - NEW_ONLY=false
      - RENDER_DISTANCE=28
      - FLY_Y=200
      - GRID_STEP=160
      - WP_DELAY=1000
      - REGION_DELAY=2000
      - FOLLOW_PLAYER=${FOLLOW_PLAYER:-}
      - SHUTDOWN_ON_COMPLETE=true
      - BOT_COUNT=${BOT_COUNT:-1}
      - BOT_INDEX=0
    volumes:
      - '${WORLD_PATH:-./world}:/repo/world:ro'
      - './.git:/repo/.git:ro'
      - './state:/app/state'

  visitor1:
    build: ./bot
    restart: "no"
    profiles:
      - multi
    depends_on:
      mc:
        condition: service_healthy
    environment:
      - WORLD_DIR=/repo/world
      - STATE_DIR=/app/state
      - MC_HOST=mc
      - MC_PORT=25565
      - MC_USERNAME=${MC_USERNAME:-Bot}
      - MC_AUTH=offline
      - NEW_ONLY=false
      - RENDER_DISTANCE=28
      - FLY_Y=200
      - GRID_STEP=160
      - WP_DELAY=1000
      - REGION_DELAY=2000
      - FOLLOW_PLAYER=${FOLLOW_PLAYER:-}
      - SHUTDOWN_ON_COMPLETE=false
      - BOT_COUNT=${BOT_COUNT:-2}
      - BOT_INDEX=1
    volumes:
      - '${WORLD_PATH:-./world}:/repo/world:ro'
      - './.git:/repo/.git:ro'
      - './state:/app/state'

  visitor2:
    build: ./bot
    restart: "no"
    profiles:
      - multi
    depends_on:
      mc:
        condition: service_healthy
    environment:
      - WORLD_DIR=/repo/world
      - STATE_DIR=/app/state
      - MC_HOST=mc
      - MC_PORT=25565
      - MC_USERNAME=${MC_USERNAME:-Bot}
      - MC_AUTH=offline
      - NEW_ONLY=false
      - RENDER_DISTANCE=28
      - FLY_Y=200
      - GRID_STEP=160
      - WP_DELAY=1000
      - REGION_DELAY=2000
      - FOLLOW_PLAYER=${FOLLOW_PLAYER:-}
      - SHUTDOWN_ON_COMPLETE=false
      - BOT_COUNT=${BOT_COUNT:-3}
      - BOT_INDEX=2
    volumes:
      - '${WORLD_PATH:-./world}:/repo/world:ro'
      - './.git:/repo/.git:ro'
      - './state:/app/state'

  visitor3:
    build: ./bot
    restart: "no"
    profiles:
      - multi
    depends_on:
      mc:
        condition: service_healthy
    environment:
      - WORLD_DIR=/repo/world
      - STATE_DIR=/app/state
      - MC_HOST=mc
      - MC_PORT=25565
      - MC_USERNAME=${MC_USERNAME:-Bot}
      - MC_AUTH=offline
      - NEW_ONLY=false
      - RENDER_DISTANCE=28
      - FLY_Y=200
      - GRID_STEP=160
      - WP_DELAY=1000
      - REGION_DELAY=2000
      - FOLLOW_PLAYER=${FOLLOW_PLAYER:-}
      - SHUTDOWN_ON_COMPLETE=false
      - BOT_COUNT=${BOT_COUNT:-4}
      - BOT_INDEX=3
    volumes:
      - '${WORLD_PATH:-./world}:/repo/world:ro'
      - './.git:/repo/.git:ro'
      - './state:/app/state'

  bluemap:
    image: ghcr.io/bluemap-minecraft/bluemap:latest
    restart: always
    command: -r -f -u -w
    ports:
      - '8100:8100'
    volumes:
      - './config:/app/config'
      - '${WORLD_PATH:-./world}:/app/world'
      - './data:/app/data'
      - './web:/app/web'
      - './world_nether:/app/world_nether'
      - './world_the_end:/app/world_the_end'
    profiles:
      - bluemap
